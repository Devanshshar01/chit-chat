services:
  - type: web
    name: unnamed-chat-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: JWT_SECRET
        sync: false
      - key: SEED_DEVANSH_PASSCODE
        sync: false
      - key: SEED_SWARNIMA_PASSCODE
        sync: false
